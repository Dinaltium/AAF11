name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Test mode by default — no secrets, no external DB. Hub builds against SQLite.
env:
  AAF11_DATA_MODE: test
  PAYLOAD_SECRET: ci-test-secret-not-used-in-prod

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Build web
        run: pnpm --filter @aaf11/web build

      - name: Build hub
        run: pnpm --filter @aaf11/hub build
