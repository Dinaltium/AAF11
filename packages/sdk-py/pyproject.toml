[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aaf11"
version = "0.1.0"
description = "AAF11 Nexus connector SDK for Python projects — exposes /aaf11/* and registers with the Hub."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Team AAF11" }]
dependencies = []

[project.optional-dependencies]
fastapi = ["fastapi>=0.110", "httpx>=0.27"]
dev = ["fastapi>=0.110", "httpx>=0.27"]

[tool.hatch.build.targets.wheel]
packages = ["aaf11"]
